<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChessKnot Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: #fff; }
        p { color: #aaa; margin-bottom: 2rem; }
        .games {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .game-card {
            display: block;
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 12px;
            padding: 2rem 2.5rem;
            text-decoration: none;
            color: #e0e0e0;
            transition: border-color 0.2s, transform 0.2s;
            width: 200px;
        }
        .game-card:hover {
            border-color: #e94560;
            transform: translateY(-4px);
        }
        .game-card h2 { font-size: 1.3rem; margin-bottom: 0.5rem; color: #fff; }
        .game-card .desc { font-size: 0.85rem; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ChessKnot</h1>
        <p>Choose a variant to play</p>
        <div class="games">
            <a href="chessknot/" class="game-card">
                <h2>ChessKnot</h2>
                <div class="desc">Pieces move to any empty square</div>
            </a>
            <a href="wazirknot/" class="game-card">
                <h2>WazirKnot</h2>
                <div class="desc">Pieces move one step orthogonally</div>
            </a>
            <a href="rookknot/" class="game-card">
                <h2>RookKnot</h2>
                <div class="desc">Pieces slide along ranks and files</div>
            </a>
        </div>
    </div>
</body>
</html>
